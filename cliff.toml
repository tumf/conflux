# git-cliff configuration for changelog generation
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
# Template for changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# Changelog footer
footer = """
"""
# Remove leading/trailing whitespace
trim = true

[git]
# Parse conventional commits
conventional_commits = true
# Filter out conventional commits
filter_unconventional = false
# Process each line of a commit as an individual commit
split_commits = false
# Regex for preprocessing commit messages
commit_preprocessors = [
    # Remove issue references
    { pattern = '\(#([0-9]+)\)', replace = "" },
]
# Commit parsers
commit_parsers = [
    # Skip certain commit types
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^Release", skip = true },
    # Conventional commits
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    # Natural language patterns (non-conventional)
    { message = "^[Aa]dd", group = "Features" },
    { message = "^[Ii]mplement", group = "Features" },
    { message = "^[Ff]ix", group = "Bug Fixes" },
    { message = "^[Rr]esolve", group = "Bug Fixes" },
    { message = "^[Uu]pdate.*[Dd]oc", group = "Documentation" },
    { message = "^[Rr]efactor", group = "Refactoring" },
    # Default category
    { message = ".*", group = "Other" },
]
# Filter commits by path
filter_commits = false
# Tag filtering pattern
tag_pattern = "v[0-9].*"
# Regex for skipping tags
skip_tags = "v0.0.*"
# Sort by newest first
topo_order = false
# Sort commits by date
sort_commits = "oldest"
