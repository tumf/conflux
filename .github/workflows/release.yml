# Release workflow for openspec-orchestrator
# Triggered by version tags (v*.*.*)
# Uses cargo-dist for cross-platform binary builds

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  pull_request:

env:
  # Target platforms for cargo-dist
  PLAN: >-
    [
      {"os": "macos-14", "target": "aarch64-apple-darwin", "install-dist": "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh | sh"},
      {"os": "macos-13", "target": "x86_64-apple-darwin", "install-dist": "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh | sh"},
      {"os": "ubuntu-22.04", "target": "x86_64-unknown-linux-gnu", "install-dist": "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh | sh"},
      {"os": "ubuntu-22.04", "target": "aarch64-unknown-linux-gnu", "install-dist": "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh | sh"},
      {"os": "windows-2022", "target": "x86_64-pc-windows-msvc", "install-dist": "powershell -c \"irm https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.ps1 | iex\""}
    ]

jobs:
  # Determine build matrix
  plan:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      tag: ${{ steps.plan.outputs.tag }}
      val: ${{ steps.plan.outputs.val }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine tag
        id: plan
        run: |
          # Get tag from ref or use dev for PRs
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="dev"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "matrix=$PLAN" >> "$GITHUB_OUTPUT"

          # Validate version format for release tags
          if [[ "$TAG" != "dev" ]]; then
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
              echo "::error::Invalid version tag format: $TAG"
              exit 1
            fi
            echo "val=true" >> "$GITHUB_OUTPUT"
          else
            echo "val=false" >> "$GITHUB_OUTPUT"
          fi

  # Build platform-specific artifacts
  build-local-artifacts:
    name: Build (${{ matrix.target }})
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/openspec dist/
          cd dist
          tar -czvf openspec-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.tar.gz openspec
          rm openspec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/openspec.exe dist/
          Compress-Archive -Path dist/openspec.exe -DestinationPath dist/openspec-${{ needs.plan.outputs.tag }}-${{ matrix.target }}.zip
          Remove-Item dist/openspec.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/*

  # Build global artifacts (checksums, installers)
  build-global-artifacts:
    name: Build global artifacts
    needs: [plan, build-local-artifacts]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate shell installer
        run: |
          cat > artifacts/install.sh << 'INSTALLER'
          #!/bin/sh
          # openspec installer script
          set -e

          REPO="tumf/openspec-orchestrator"
          BINARY="openspec"

          # Detect OS and architecture
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)

          case "$OS" in
            darwin) OS="apple-darwin" ;;
            linux) OS="unknown-linux-gnu" ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          case "$ARCH" in
            x86_64) ARCH="x86_64" ;;
            arm64|aarch64) ARCH="aarch64" ;;
            *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          TARGET="${ARCH}-${OS}"
          VERSION="${VERSION:-latest}"

          if [ "$VERSION" = "latest" ]; then
            DOWNLOAD_URL="https://github.com/${REPO}/releases/latest/download/${BINARY}-${TARGET}.tar.gz"
          else
            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/${BINARY}-${TARGET}.tar.gz"
          fi

          echo "Downloading ${BINARY} for ${TARGET}..."
          curl -fsSL "$DOWNLOAD_URL" | tar -xz

          # Install to ~/.cargo/bin or /usr/local/bin
          INSTALL_DIR="${CARGO_HOME:-$HOME/.cargo}/bin"
          mkdir -p "$INSTALL_DIR"
          mv "$BINARY" "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/$BINARY"

          echo "Installed ${BINARY} to ${INSTALL_DIR}/${BINARY}"
          INSTALLER

      - name: Generate PowerShell installer
        run: |
          cat > artifacts/install.ps1 << 'INSTALLER'
          # openspec installer script for Windows
          $ErrorActionPreference = "Stop"

          $Repo = "tumf/openspec-orchestrator"
          $Binary = "openspec"
          $Target = "x86_64-pc-windows-msvc"

          if ($env:VERSION) {
            $Version = $env:VERSION
          } else {
            $Version = "latest"
          }

          if ($Version -eq "latest") {
            $DownloadUrl = "https://github.com/$Repo/releases/latest/download/$Binary-$Target.zip"
          } else {
            $DownloadUrl = "https://github.com/$Repo/releases/download/$Version/$Binary-$Target.zip"
          }

          $TempDir = Join-Path $env:TEMP "openspec-install"
          $ZipPath = Join-Path $TempDir "$Binary.zip"

          New-Item -ItemType Directory -Force -Path $TempDir | Out-Null

          Write-Host "Downloading $Binary..."
          Invoke-WebRequest -Uri $DownloadUrl -OutFile $ZipPath

          Write-Host "Extracting..."
          Expand-Archive -Path $ZipPath -DestinationPath $TempDir -Force

          # Install to ~/.cargo/bin
          $InstallDir = Join-Path $env:USERPROFILE ".cargo\bin"
          New-Item -ItemType Directory -Force -Path $InstallDir | Out-Null
          Move-Item -Path (Join-Path $TempDir "$Binary.exe") -Destination $InstallDir -Force

          Write-Host "Installed $Binary to $InstallDir\$Binary.exe"

          # Cleanup
          Remove-Item -Recurse -Force $TempDir
          INSTALLER

      - name: Upload global artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-global
          path: artifacts/*

  # Create GitHub Release
  host:
    name: Create Release
    needs: [plan, build-global-artifacts]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: Release ${{ needs.plan.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.plan.outputs.tag, '-') }}
          generate_release_notes: true
          files: artifacts/*

  # Update Homebrew formula
  publish-homebrew-formula:
    name: Publish Homebrew Formula
    needs: [plan, host]
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          VERSION="${TAG#v}"

          # Get SHA256 for macOS ARM64
          DARWIN_ARM64_SHA=$(sha256sum artifacts/openspec-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          DARWIN_X64_SHA=$(sha256sum artifacts/openspec-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum artifacts/openspec-${TAG}-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum artifacts/openspec-${TAG}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          cat > openspec.rb << FORMULA
          class Openspec < Formula
            desc "OpenSpec orchestrator for AI-assisted development workflows"
            homepage "https://github.com/tumf/openspec-orchestrator"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/tumf/openspec-orchestrator/releases/download/${TAG}/openspec-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/tumf/openspec-orchestrator/releases/download/${TAG}/openspec-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${DARWIN_X64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/tumf/openspec-orchestrator/releases/download/${TAG}/openspec-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/tumf/openspec-orchestrator/releases/download/${TAG}/openspec-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "openspec"
            end

            test do
              system "#{bin}/openspec", "--version"
            end
          end
          FORMULA

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tumf/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp openspec.rb tap/Formula/
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/openspec.rb
          git commit -m "Update openspec to ${{ needs.plan.outputs.tag }}" || exit 0
          git push
