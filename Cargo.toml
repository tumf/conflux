[package]
name = "openspec-orchestrator"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full", "process"] }
tokio-util = "0.7"
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
indicatif = "0.17"
ratatui = "0.29"
crossterm = "0.28"
chrono = "0.4"
dirs = "5"
libc = "0.2"
unicode-width = "0.2"
regex = "1.12.2"
md5 = "0.7"

[dev-dependencies]
tempfile = "3"
